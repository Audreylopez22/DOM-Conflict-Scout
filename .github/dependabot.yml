version: 2
updates:
  # Mantener las dependencias de npm (pnpm) actualizadas
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3
    # Agrupar actualizaciones para evitar ruido (opcional)
    groups:
      dependencies:
        patterns:
          - "*"
